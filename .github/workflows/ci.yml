name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - run: npm test

  backend:
    name: Python Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python -m unittest discover -s tests -p '*_test.py'

  desktop:
    name: Desktop Artifact (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [frontend, backend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            sidecar: siftd
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar: siftd.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install
      - run: pip install -r requirements.txt
      - run: pyinstaller --onefile --name siftd backend/siftd/main.py
      - name: Stage sidecar (macOS)
        if: runner.os == 'macOS'
        run: cp dist/siftd src-tauri/binaries/siftd-${{ matrix.target }}
      - name: Stage sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item dist/siftd.exe src-tauri/binaries/siftd-${{ matrix.target }}.exe
      - run: npm run tauri:build
      - uses: actions/upload-artifact@v4
        with:
          name: sift-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe

  prerelease:
    name: Draft Prerelease
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [desktop]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t assets < <(find artifacts -type f \( -name '*.dmg' -o -name '*.msi' -o -name '*.exe' \) -print)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi
          gh release create "${GITHUB_REF_NAME}" "${assets[@]}" --repo "${GITHUB_REPOSITORY}" --draft --prerelease --title "${GITHUB_REF_NAME}" --notes "Early Sift desktop prerelease."
